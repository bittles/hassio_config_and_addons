AUDIO_CODEC: COPY
DEBUG_FFMPEG: true
DEBUG_FRAMES: false
ENABLE_AUDIO: true
FFMPEG_CMD: '-loglevel verbose -flags low_delay -analyzeduration 150 -probesize 150
  -re -f h264 -r 20 -thread_queue_size 128 -i pipe: -f alaw -thread_queue_size 128
  -r 21 -ar 16000 -i /tmp/{cam_name}.wav -c:v copy -c:a copy -movflags +empty_moov+default_base_moof+frag_keyframe+rtphint
  -f tee -r 20 -map 0:v -map 1:a -shortest [select=v,a:f=rtsp:rtsp_transport=tcp]rtsp://0.0.0.0:8554/{cam_name}'
FPS_FIX: true
FRESH_DATA: true
IGNORE_RES: 3
IMG_TYPE: jpg
KEEP_BAD_FRAMES: true
MQTT_DTOPIC: homeassistant
NET_MODE: LAN
QUALITY: HD120
RTSP_HLSDISABLE: 'yes'
RTSP_RTMPDISABLE: 'no'
RTSP_RTSPDISABLE: 'no'
SNAPSHOT: API
WEBRTC: false
