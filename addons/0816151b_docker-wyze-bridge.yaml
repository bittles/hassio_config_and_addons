AUDIO_CODEC: LIBOPUS
AUDIO_FILTER: highpass=f=300,lowpass=f=2500,volume=volume=2
CAM_OPTIONS:
- BACK_DECK_CAM: Back Deck Cam
  FFMPEG: 'ffmpeg -loglevel verbose -fflags +genpts -flags low_delay -analyzeduration
    70 -probesize 50 -r 15 -thread_queue_size 384 -f h264 -i pipe: -f alaw -ar 16000
    -ac 1 -thread_queue_size 756 -i /tmp/{cam_name}.wav -pix_fmt yuv420p -c:v copy
    -c:a libopus -b:a 64k -ac 1 -movflags +empty_moov+default_base_moof+frag_keyframe
    -flags +global_header -f tee -map 0:v -map 1:a [select=v,a:f=rtsp:rtsp_transport=tcp]rtsp://0.0.0.0:8554/{cam_name}'
DEBUG_FFMPEG: true
DEBUG_FRAMES: false
ENABLE_AUDIO: true
FFMPEG_CMD: 'ffmpeg -fflags +genpts+flush_packets -flags low_delay -analyzeduration
  55 -probesize 50 -r 20 -thread_queue_size 384 -f h264 -i pipe: -f alaw -ar 16000
  -ac 1 -thread_queue_size 756 -i /tmp/{cam_name}.wav -pix_fmt yuv420p -c:v copy -c:a
  libopus -b:a 64k -ac 1 -movflags +empty_moov+default_base_moof+frag_keyframe -flags
  +global_header -f tee -map 0:v -map 1:a [select=v,a:f=rtsp:rtsp_transport=tcp]rtsp://0.0.0.0:8554/{cam_name}'
FORCE_FPS_BACK_DECK_CAM: 15
FORCE_FPS_DRIVEWAY_CAM: 20
FORCE_FPS_FRONT_PORCH_CAM: 20
FPS_FIX: false
FRESH_DATA: false
IGNORE_RES: 3
IMG_TYPE: jpg
KEEP_BAD_FRAMES: true
LLHLS: true
MQTT_AUTH: mqtt:mosquitto
MQTT_DTOPIC: homeassistant
MQTT_HOST: 192.168.29.189:1883
NET_MODE: LAN
QUALITY: HD120
RTSP_HLSDISABLE: 'no'
RTSP_RTMPDISABLE: 'yes'
RTSP_RTSPDISABLE: 'no'
SNAPSHOT: API
